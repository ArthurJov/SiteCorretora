<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Título genérico — evita aparecer em buscas como "painel admin" -->
  <title>Juscelia Sousa Imóveis</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

  <div class="login-card">

    <!-- Cabeçalho -->
    <div class="login-header">
      <div class="login-logo-icon" aria-hidden="true">🏠</div>
      <h1 class="login-titulo">Área Restrita</h1>
      <p class="login-sub">Juscelia Sousa Imóveis</p>
    </div>

    <!-- Formulário de login -->
    <form id="form-login" class="login-form" novalidate>

      <div class="campo-grupo">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
          placeholder="seuemail@email.com"
          spellcheck="false"
        >
      </div>

      <div class="campo-grupo">
        <label for="senha">Senha</label>
        <div class="senha-wrapper">
          <input
            type="password"
            id="senha"
            name="senha"
            required
            autocomplete="current-password"
            placeholder="••••••••"
          >
          <button type="button" id="btn-ver-senha" class="btn-ver-senha" aria-label="Mostrar senha">
            <!-- Olho fechado -->
            <svg id="icone-olho-fechado" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <!-- Olho aberto -->
            <svg id="icone-olho-aberto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mensagens de feedback -->
      <p id="erro-login" class="msg-erro" role="alert" aria-live="assertive"></p>
      <p id="info-recuperar" class="msg-info" aria-live="polite"></p>

      <button type="submit" id="btn-entrar" class="btn-primario btn-full">
        Entrar
      </button>

    </form>

    <!-- Recuperação de senha -->
    <button type="button" id="btn-recuperar" class="btn-link">
      Esqueci minha senha
    </button>

  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
