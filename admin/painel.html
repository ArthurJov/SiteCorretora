<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel — Juscelia Imóveis</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="painel-page">

  <!-- ── Header ───────────────────────────────────────────────── -->
  <header class="painel-header">
    <div class="painel-header-esq">
      <span class="painel-logo">🏠 Juscelia Imóveis</span>
      <span class="painel-badge">Admin</span>
    </div>
    <div class="painel-header-dir">
      <span id="usuario-nome" class="usuario-email"></span>
      <button id="btn-sair" class="btn-sair">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          width="16" height="16">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <!-- ── Toolbar ──────────────────────────────────────────────── -->
  <div class="painel-toolbar">
    <div class="toolbar-esq">
      <button id="btn-adicionar" class="btn-primario">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar Imóvel
      </button>
    </div>
    <div class="toolbar-dir">
      <select id="filtro-status" class="select-filtro" aria-label="Filtrar por status">
        <option value="">Todos os status</option>
        <option value="disponivel">Disponível</option>
        <option value="vendido">Vendido</option>
        <option value="alugado">Alugado</option>
      </select>
      <select id="filtro-tipo" class="select-filtro" aria-label="Filtrar por tipo">
        <option value="">Todos os tipos</option>
        <option value="casa">Casa</option>
        <option value="pousada">Pousada</option>
        <option value="villa">Villa</option>
        <option value="terreno">Terreno</option>
      </select>
    </div>
  </div>

  <!-- ── Contador de imóveis ──────────────────────────────────── -->
  <div class="painel-stats">
    <span id="contador-imoveis" class="stats-label"></span>
  </div>

  <!-- ── Lista de imóveis ─────────────────────────────────────── -->
  <main class="painel-main">
    <div id="lista-imoveis" aria-live="polite">
      <div class="lista-loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <span>Carregando imóveis...</span>
      </div>
    </div>
  </main>

  <!-- ── Modal de formulário (Adicionar / Editar) ─────────────── -->
  <div id="modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal-box">

      <div class="modal-header">
        <h2 id="modal-titulo">Adicionar imóvel</h2>
        <button id="btn-fechar-modal" class="btn-fechar" aria-label="Fechar modal">✕</button>
      </div>

      <form id="form-imovel" class="form-imovel" novalidate>

        <div class="form-grid">

          <!-- Título -->
          <div class="form-grupo form-full">
            <label for="campo-titulo">Título *</label>
            <input type="text" id="campo-titulo" name="titulo" required
              placeholder="Ex: Casa de temporada em Ituberá">
          </div>

          <!-- Tipo -->
          <div class="form-grupo">
            <label for="campo-tipo">Tipo *</label>
            <select id="campo-tipo" name="tipo" required>
              <option value="casa">Casa</option>
              <option value="pousada">Pousada</option>
              <option value="villa">Villa</option>
              <option value="terreno">Terreno</option>
            </select>
          </div>

          <!-- Finalidade -->
          <div class="form-grupo">
            <label for="campo-finalidade">Finalidade *</label>
            <select id="campo-finalidade" name="finalidade" required>
              <option value="venda">Venda</option>
              <option value="temporada">Temporada</option>
              <option value="aluguel">Aluguel</option>
            </select>
          </div>

          <!-- Status -->
          <div class="form-grupo">
            <label for="campo-status">Status *</label>
            <select id="campo-status" name="status" required>
              <option value="disponivel">Disponível</option>
              <option value="vendido">Vendido</option>
              <option value="alugado">Alugado</option>
            </select>
          </div>

          <!-- Preço -->
          <div class="form-grupo">
            <label for="campo-preco">Preço (R$) *</label>
            <input type="number" id="campo-preco" name="preco" min="0" required
              placeholder="Ex: 350000">
          </div>

          <!-- Área -->
          <div class="form-grupo">
            <label for="campo-area">Área (m²)</label>
            <input type="number" id="campo-area" name="area_m2" min="0"
              placeholder="Ex: 200">
          </div>

          <!-- Quartos -->
          <div class="form-grupo">
            <label for="campo-quartos">Quartos</label>
            <input type="number" id="campo-quartos" name="quartos" min="0" value="0">
          </div>

          <!-- Banheiros -->
          <div class="form-grupo">
            <label for="campo-banheiros">Banheiros</label>
            <input type="number" id="campo-banheiros" name="banheiros" min="0" value="0">
          </div>

          <!-- Vagas -->
          <div class="form-grupo">
            <label for="campo-vagas">Vagas de garagem</label>
            <input type="number" id="campo-vagas" name="vagas" min="0" value="0">
          </div>

          <!-- Localização -->
          <div class="form-grupo form-full">
            <label for="campo-localizacao">Localização</label>
            <input type="text" id="campo-localizacao" name="localizacao"
              placeholder="Ex: Barra de Serinhaém, Ituberá, BA">
          </div>

          <!-- Link Google Maps -->
          <div class="form-grupo form-full">
            <label for="campo-maps">Link Google Maps</label>
            <input type="url" id="campo-maps" name="maps_url"
              placeholder="https://maps.google.com/...">
          </div>

          <!-- Fotos — Upload para Firebase Storage -->
          <div class="form-grupo form-full">
            <label>
              Fotos
              <span class="label-dica">(máx. 10 imagens · JPG, PNG ou WEBP)</span>
            </label>

            <!-- Zona de drag & drop -->
            <div id="zona-upload" class="zona-upload" role="button" tabindex="0"
              aria-label="Clique ou arraste imagens aqui">
              <input
                type="file"
                id="campo-fotos-input"
                accept="image/jpeg,image/png,image/webp"
                multiple
                style="display:none"
                aria-hidden="true"
              >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" class="upload-icon">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p class="upload-texto">
                <strong>Clique para selecionar</strong> ou arraste as fotos aqui
              </p>
              <p class="upload-sub">JPG, PNG ou WEBP — até 10 imagens</p>
            </div>

            <!-- Barra de progresso (aparece durante o upload) -->
            <div id="upload-progresso-wrap" class="upload-progresso-wrap" style="display:none">
              <div id="upload-progresso-barra" class="upload-progresso-barra"></div>
              <span id="upload-progresso-texto" class="upload-progresso-texto">Enviando…</span>
            </div>

            <!-- Grid de previews -->
            <div id="fotos-preview-grid" class="fotos-preview-grid"></div>

            <!-- Campo hidden que guarda as URLs finais (lidas pelo coletarDadosFormulario) -->
            <input type="hidden" id="campo-fotos-urls" name="fotos" value="">
          </div>

          <!-- Descrição -->
          <div class="form-grupo form-full">
            <label for="campo-descricao">Descrição</label>
            <textarea id="campo-descricao" name="descricao" rows="4"
              placeholder="Descreva o imóvel com detalhes..."></textarea>
          </div>

          <!-- Mensagem WhatsApp -->
          <div class="form-grupo form-full">
            <label for="campo-wpp">
              Mensagem WhatsApp
              <span class="label-dica">(gerada automaticamente se deixar em branco)</span>
            </label>
            <textarea id="campo-wpp" name="wpp_msg" rows="2"
              placeholder="Olá Juscelia! Tenho interesse no imóvel..."></textarea>
          </div>

          <!-- Destaque -->
          <div class="form-grupo form-full form-checkbox">
            <label class="checkbox-label">
              <input type="checkbox" id="campo-destaque" name="destaque">
              <span class="checkbox-custom"></span>
              ⭐ Destacar este imóvel no site (aparece primeiro)
            </label>
          </div>

        </div><!-- /form-grid -->

        <div class="form-acoes">
          <button type="button" id="btn-cancelar" class="btn-secundario">Cancelar</button>
          <button type="submit" id="btn-salvar" class="btn-primario">Salvar imóvel</button>
        </div>

      </form>
    </div><!-- /modal-box -->
  </div><!-- /modal-overlay -->

  <!-- ── Toast de feedback ─────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="admin.js"></script>
</body>
</html>
